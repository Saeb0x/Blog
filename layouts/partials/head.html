<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
<meta name="author" content="{{ .Site.Params.author }}">

<title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} — {{ .Site.Title }}{{ end }}</title>

<meta property="og:title" content="{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }}{{ end }}">
<meta property="og:description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
<meta property="og:type" content="{{ if .IsPage }}article{{ else }}website{{ end }}">
<meta property="og:url" content="{{ .Permalink }}">

<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="manifest" href="/site.webmanifest">

{{ $scss := resources.Get "scss/main.scss" | toCSS }}
{{ if hugo.IsProduction }}{{ $scss = $scss | minify | fingerprint }}{{ end }}
<link rel="stylesheet" href="{{ $scss.Permalink }}"{{ if hugo.IsProduction }} integrity="{{ $scss.Data.Integrity }}"{{ end }}>

{{ $js := resources.Get "js/main.js" }}
{{ if hugo.IsProduction }}{{ $js = $js | minify | fingerprint }}{{ end }}
<script src="{{ $js.Permalink }}" defer></script>
